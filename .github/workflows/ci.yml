name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            skillstrader-frontend/package-lock.json

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        run: npm --prefix skillstrader-frontend ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
