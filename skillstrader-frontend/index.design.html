<!doctype html>
<!-- Static design reference (not the Vite entrypoint). -->
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillsTrader — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg);
      transition: background var(--transition);
    }

    :root {
      --bg:        #f0ede8;
      --surface:   #faf9f7;
      --surface2:  #f2efe9;
      --text:      #1a1714;
      --muted:     #7a7570;
      --border:    rgba(26,23,20,0.10);
      --primary:   #c84b31;
      --primary2:  #e05a3a;
      --accent:    #2c6e49;
      --shadow:    0 32px 80px rgba(26,23,20,0.13);
      --inset:     inset 0 1px 0 rgba(255,255,255,0.65);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
      --radius: 20px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"] {
      --bg:        #131110;
      --surface:   #1d1b18;
      --surface2:  #262320;
      --text:      rgba(255,251,245,0.93);
      --muted:     rgba(255,251,245,0.50);
      --border:    rgba(255,251,245,0.10);
      --primary:   #e8765a;
      --primary2:  #f08060;
      --accent:    #52b788;
      --shadow:    0 32px 80px rgba(0,0,0,0.55);
      --inset:     inset 0 1px 0 rgba(255,255,255,0.06);
    }

    html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); transition: background var(--transition), color var(--transition); }

    /* ── Page layout ── */
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 860px) {
      .page { grid-template-columns: 1fr; }
      .left-panel { display: none; }
    }

    /* ── Left decorative panel ── */
    .left-panel {
      position: relative;
      overflow: hidden;
      background: var(--text);
    }

    .left-panel-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 20% 110%, rgba(200,75,49,0.55), transparent 60%),
        radial-gradient(ellipse 70% 60% at 85% -10%, rgba(44,110,73,0.45), transparent 55%),
        radial-gradient(ellipse 60% 50% at 60% 60%, rgba(200,75,49,0.15), transparent 50%);
      animation: bgShift 10s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0.85; transform: scale(1.06); }
    }

    .left-panel-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .left-panel-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      justify-content: space-between;
      height: 100%; padding: 44px 48px;
    }

    .brand {
      display: flex; align-items: center; gap: 12px;
    }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 11px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
      color: #fff; letter-spacing: 0.2px;
    }

    .panel-headline {
      font-family: var(--font-display);
      font-size: clamp(32px, 3.5vw, 50px);
      font-weight: 700; line-height: 1.12;
      color: #fff; letter-spacing: -0.02em;
    }
    .panel-headline em {
      font-style: italic;
      color: rgba(255,255,255,0.6);
    }

    .panel-tagline {
      margin-top: 18px;
      color: rgba(255,255,255,0.58);
      font-size: 15px; line-height: 1.65; max-width: 38ch;
    }

    .panel-pills {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px;
    }
    .panel-pill {
      padding: 7px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.3px;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
    }

    .panel-footer {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }



    .theme-toggle {
      position: absolute; top: 28px; right: 28px;
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), border-color var(--transition), transform 0.18s;
      box-shadow: var(--inset);
    }
    .theme-toggle:hover { transform: rotate(20deg); color: var(--text); }

    /* Mobile brand */
    .mobile-brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .mobile-brand-mark {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }
    .mobile-brand-name {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 700;
      color: var(--text);
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow), var(--inset);
      padding: 36px 32px;
      transition: background var(--transition), box-shadow var(--transition);
      animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 480px) {
      .card { padding: 28px 22px; }
    }

    .card-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--primary);
      margin-bottom: 10px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 700; line-height: 1.2;
      letter-spacing: -0.01em; color: var(--text);
    }

    .card-sub {
      margin-top: 7px; font-size: 14px; color: var(--muted); line-height: 1.6;
    }

    /* ── Form ── */
    .form { margin-top: 26px; display: grid; gap: 16px; }

    .field { display: grid; gap: 7px; }

    .label-row {
      display: flex; align-items: baseline; justify-content: space-between;
    }

    label {
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted);
    }

    .forgot {
      font-size: 12px; color: var(--primary);
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .forgot:hover { opacity: 0.75; }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
      transition: color 0.2s;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      padding: 12px 14px 12px 42px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s, background var(--transition);
      outline: none;
    }

    input::placeholder { color: var(--muted); opacity: 0.7; }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(200,75,49,0.12);
      background: var(--surface);
    }

    [data-theme="dark"] input:focus {
      box-shadow: 0 0 0 4px rgba(232,118,90,0.15);
    }

    .input-wrap:focus-within .input-icon { color: var(--primary); }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Alert ── */
    .alert {
      border-radius: 12px; padding: 10px 13px;
      font-size: 13px; border: 1px solid;
      animation: alertIn 0.25s ease both;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: none; }
    }
    .alert-error  { border-color: rgba(200,75,49,0.3); background: rgba(200,75,49,0.08); color: var(--primary); }
    .alert-success{ border-color: rgba(44,110,73,0.3);  background: rgba(44,110,73,0.08);  color: var(--accent); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      border: none;
      border-radius: 13px;
      padding: 13px 20px;
      font-family: var(--font-body);
      font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.15s, filter 0.15s;
      box-shadow: 0 6px 24px rgba(200,75,49,0.28);
    }
    .btn-primary::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      pointer-events: none;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.06); transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(1px); filter: none; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-social {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      padding: 11px 20px;
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      box-shadow: var(--inset);
    }
    .btn-social:hover {
      background: var(--surface);
      border-color: rgba(26,23,20,0.2);
      transform: translateY(-1px);
    }
    [data-theme="dark"] .btn-social:hover { border-color: rgba(255,255,255,0.2); }

    /* ── Footer link ── */
    .signup-row {
      margin-top: 20px;
      text-align: center;
      font-size: 13px; color: var(--muted);
    }
    .signup-row a {
      color: var(--primary); text-decoration: none; font-weight: 600;
      transition: opacity 0.15s;
    }
    .signup-row a:hover { opacity: 0.75; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="page">
  <div style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;">
    <div style="width:100%;display:flex;justify-content:flex-end;margin-bottom:14px;">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme" style="position:static;">
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <!-- Mobile brand -->
    <div class="mobile-brand">
      <div class="mobile-brand-mark"></div>
      <span class="mobile-brand-name">SkillsTrader</span>
    </div>

    <div class="card">
      <p class="card-eyebrow">Welcome back</p>
      <h1 class="card-title">Sign in to your account</h1>
      <p class="card-sub">New here? <a href="#" style="color:var(--primary);font-weight:600;">Create a free account →</a></p>

      <div class="form">
        <!-- Alert placeholder -->
        <div id="alert" style="display:none"></div>

        <!-- Email -->
        <div class="field">
          <div class="label-row"><label for="email">Email</label></div>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot">Forgot password?</a>
          </div>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
        </div>

        <!-- Submit -->
        <button class="btn-primary" id="submitBtn" onclick="handleLogin()">
          Sign in
        </button>
      </div>

    <p class="signup-row">No account? <a href="#">Join SkillsTrader free</a></p>
    </div>
  </div>
</div>

<script>
  // ── Theme ──
  function getTheme() {
    try { return localStorage.getItem('skillstrader_theme') || 'light'; } catch { return 'light'; }
  }
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    document.getElementById('icon-sun').style.display  = t === 'dark'  ? 'block' : 'none';
    document.getElementById('icon-moon').style.display = t === 'light' ? 'block' : 'none';
    try { localStorage.setItem('skillstrader_theme', t); } catch {}
  }
  function toggleTheme() {
    applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
  }
  applyTheme(getTheme());

  // ── Login handler (demo) ──
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.className = 'alert alert-' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }
  function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    if (!email || !password) {
      showAlert('Please fill in all fields.', 'error'); return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showAlert('Please enter a valid email address.', 'error'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Sign in';
      showAlert('Signed in successfully! Redirecting…', 'success');
    }, 1800);
  }
  // Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
